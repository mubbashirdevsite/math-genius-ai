<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Genius AI</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/solver.css">
    <link rel="stylesheet" href="css/calculator.css">
    <link rel="stylesheet" href="css/graph.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/formulas.css">
    <link rel="stylesheet" href="css/quiz.css">
    <link rel="stylesheet" href="css/notes.css">
    <link rel="stylesheet" href="css/profile.css">


<style >
.logo{
    cursor:pointer;
    user-select:none;
}

.logo:hover{
    opacity:.50;
}
</style>


</head>

<body class="dark-theme">

    <!-- Top Navbar -->
    <header class="top-navbar">
        <div class="logo" onclick="navigate('home')" style="cursor:pointer;">

            Math Genius AI

        </div>

        <div class="top-actions">

            <button class="nav-icon" data-page="formulas">
                ∑
            </button>

            <button class="nav-icon" data-page="quiz">
                ◈
            </button>

            <button class="nav-icon" data-page="notes">
                ≡
            </button>

            <button class="nav-icon" data-page="profile">
                ◉
            </button>

            <button id="themeToggle" class="theme-btn">
                ☀
            </button>

        </div>
    </header>

    <!-- Dynamic Page Container -->
    <main id="app"></main>

    <!-- Bottom Navigation -->
    <nav class="bottom-navbar">

        <button class="bottom-nav-btn active" data-page="home">
            <span>⊕</span>
            <small>Home</small>
        </button>

        <button class="bottom-nav-btn" data-page="solver">
            <span>✦</span>
            <small>Solve</small>
        </button>

        <button class="bottom-nav-btn" data-page="calculator">
            <span>⌗</span>
            <small>Calc</small>
        </button>

        <button class="bottom-nav-btn" data-page="graph">
            <span>∿</span>
            <small>Graph</small>
        </button>

        <button class="bottom-nav-btn" data-page="chat">
            <span>⊙</span>
            <small>Tutor</small>
        </button>

    </nav>

    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/navigation.js"></script>

</body>

</html>
