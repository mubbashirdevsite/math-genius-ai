<section class="page profile-page">

    <div class="profile-header">

        <div class="profile-avatar">
            👨‍🎓
        </div>

        <h1 id="userName">
            Student
        </h1>

        <p id="userLevel">
            Beginner Learner
        </p>

    </div>

    <div class="profile-stats">

        <div class="profile-stat">
            <h2 id="totalQuizzes">0</h2>
            <span>Quizzes</span>
        </div>

        <div class="profile-stat">
            <h2 id="averageScore">0%</h2>
            <span>Average</span>
        </div>

        <div class="profile-stat">
            <h2 id="achievementCount">0</h2>
            <span>Achievements</span>
        </div>

    </div>

    <div class="profile-card">

        <h3>Your Progress</h3>

        <div class="progress-bar">

            <div
                id="progressFill"
                class="progress-fill">
            </div>

        </div>

        <p id="progressText">
            Level Progress
        </p>

    </div>

    <div class="profile-card">

        <h3>Achievements 🏆</h3>

        <div id="achievementGrid"
             class="achievement-grid">

        </div>

    </div>

    <div class="profile-card">

        <h3>Recent Scores</h3>

        <div id="recentScores">

        </div>

    </div>

</section>
